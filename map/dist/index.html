<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MRU Student Stress Heatmap</title>
    
    <!-- MapLibre GL JS - Open Source map rendering library -->
    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
    
    <!-- deck.gl - Open Source WebGL visualization framework -->
    <script src="https://unpkg.com/deck.gl@8.9.36/dist.min.js"></script>
    
    <!-- Custom styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Main map container -->
    <div id="map-container"></div>

    <!-- Collapsible right sidebar -->
    <aside id="sidebar" class="sidebar" aria-label="Map details panel">
        <button id="sidebar-toggle" class="sidebar-toggle" type="button" aria-label="Collapse sidebar" aria-expanded="true"><</button>

        <div class="sidebar-content">
            <!-- Stats display showing data point count -->
            <div class="stats">
                Data Points: <span id="data-count">0</span>
            </div>

            <!-- Stress range controls -->
            <div class="legend">
                <div class="legend-title">Stress Range</div>
                <div class="dual-slider-labels">
                    <span>1 (Low)</span>
                    <span>5 (High)</span>
                </div>
                <div class="range-slider" aria-label="Stress range selector">
                    <div class="range-track"></div>
                    <div id="range-mask-left" class="range-mask"></div>
                    <div id="range-mask-right" class="range-mask"></div>
                    <input id="stress-min" class="range-input" type="range" min="1" max="5" step="1" value="1" aria-label="Minimum stress">
                    <input id="stress-max" class="range-input" type="range" min="1" max="5" step="1" value="5" aria-label="Maximum stress">
                </div>
            </div>

            <div class="legend">
                <div class="legend-title">Date Range</div>
                <div class="date-filter-row">
                    <label class="date-filter-label" for="date-start">From</label>
                    <input id="date-start" class="date-input" type="date" aria-label="Start date">
                </div>
                <div class="date-filter-row">
                    <label class="date-filter-label" for="date-end">To</label>
                    <input id="date-end" class="date-input" type="date" aria-label="End date">
                </div>
                <div class="date-preset-buttons" aria-label="Quick date presets">
                    <button id="date-preset-this-week" class="date-preset icon-preset" type="button" title="This Week" aria-label="This Week">
                        <span class="preset-icon">W</span>
                        <span class="preset-label">Week</span>
                    </button>
                    <button id="date-preset-this-month" class="date-preset icon-preset" type="button" title="This Month" aria-label="This Month">
                        <span class="preset-icon">M</span>
                        <span class="preset-label">Month</span>
                    </button>
                    <button id="date-preset-last-month" class="date-preset icon-preset" type="button" title="Last Month" aria-label="Last Month">
                        <span class="preset-icon">L</span>
                        <span class="preset-label">Last</span>
                    </button>
                    <button id="date-preset-clear" class="date-preset icon-preset" type="button" title="Clear Date Filter" aria-label="Clear Date Filter">
                        <span class="preset-icon">X</span>
                        <span class="preset-label">Clear</span>
                    </button>
                </div>
            </div>

            <div class="legend">
                <div class="legend-title">Department Filter</div>
                <div class="date-filter-row">
                    <label class="date-filter-label" for="filter-department">Program</label>
                    <select id="filter-department" class="date-input" aria-label="Faculty and department filter">
                        <option value="">All Faculties</option>
                    </select>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main application script -->
    <script src="script.js"></script>
</body>
</html>
