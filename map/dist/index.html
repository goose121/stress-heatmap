<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MRU Student Stress Heatmap</title>
    
    <!-- MapLibre GL JS - Open Source map rendering library -->
    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
    
    <!-- deck.gl - Open Source WebGL visualization framework -->
    <script src="https://unpkg.com/deck.gl@9.0.16/dist.min.js"></script>
    
    <!-- Custom styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Main map container -->
    <div id="map-container"></div>

    <!-- Collapsible right sidebar -->
    <aside id="sidebar" class="sidebar" aria-label="Map details panel">
        <button id="sidebar-toggle" class="sidebar-toggle" type="button" aria-label="Collapse sidebar" aria-expanded="true"><</button>

        <div class="sidebar-content">
            <!-- Stats display showing data point count -->
            <div class="stats">
                Data Points: <span id="data-count">0</span>
            </div>

            <!-- Stress range controls -->
            <div class="legend">
                <div class="legend-title">Stress Range</div>
                <div class="dual-slider-labels">
                    <span>1 (Low)</span>
                    <span>5 (High)</span>
                </div>
                <div class="range-slider" aria-label="Stress range selector">
                    <div class="range-track"></div>
                    <div id="range-mask-left" class="range-mask"></div>
                    <div id="range-mask-right" class="range-mask"></div>
                    <input id="stress-min" class="range-input" type="range" min="1" max="5" step="1" value="1" aria-label="Minimum stress">
                    <input id="stress-max" class="range-input" type="range" min="1" max="5" step="1" value="5" aria-label="Maximum stress">
                </div>
            </div>
        </div>
    </aside>

    <!-- Main application script -->
    <script src="script.js"></script>
</body>
</html>
